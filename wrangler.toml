name = "dlf-agency"
account_id = "203c62d7e81cfe8c46a8321623014797"
main = "src/index.ts"
compatibility_date = "2025-03-14"
compatibility_flags = ["nodejs_compat"]

# -----------------------------------------------------------------------
# Secrets — set via `wrangler secret put <NAME>`, never hardcode values
# -----------------------------------------------------------------------
#
# Required secrets (currently deployed):
#   ADMIN_PASSWORD       — Password for the /admin panel
#   ADMIN_PIN            — PIN for API admin routes (X-Admin-Pin header)
#   GHL_CLIENT_ID        — OAuth app Client ID
#   GHL_CLIENT_SECRET    — OAuth app Client Secret
#
# Optional:
#   ERROR_WEBHOOK_URL    — Webhook URL to receive error reports
#
# NOT USED (removed — all accounts stored in D1 per-location):
#   GHL_API_KEY          — Legacy fallback, not set
#   GHL_LOCATION_ID      — Legacy fallback, not set
# -----------------------------------------------------------------------

[durable_objects]
bindings = [{ name = "MCP_OBJECT", class_name = "GHLMcpAgent" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GHLMcpAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = []

[[d1_databases]]
binding = "GHL_DB"
database_name = "ghl-accounts"
database_id = "647917a2-ace2-4b98-a10f-f822c5678646"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "ac787b89a4014510af5bf1e5e56f88f5"
